<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-hidden="true">
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bookGradient)" />
  
  <!-- Book -->
  <rect x="30" y="25" width="40" height="50" rx="2" fill="#FFFFFF" opacity="0.95" />
  <line x1="50" y1="25" x2="50" y2="75" stroke="#E5E7EB" stroke-width="1.5" />
  
  <!-- Book pages -->
  <line x1="35" y1="40" x2="45" y2="40" stroke="#9CA3AF" stroke-width="1" />
  <line x1="35" y1="50" x2="45" y2="50" stroke="#9CA3AF" stroke-width="1" />
  <line x1="35" y1="60" x2="45" y2="60" stroke="#9CA3AF" stroke-width="1" />
  
  <!-- Star decoration -->
  <path d="M 50 15 L 52 20 L 57 20 L 53 23 L 55 28 L 50 25 L 45 28 L 47 23 L 43 20 L 48 20 Z" 
        fill="url(#starGradient)" />
</svg>