name: Build and Deploy to FTP

on:
  push:
    branches:
      - main
  workflow_dispatch: # Võimaldab käsitsi käivitamist

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true # Jätkab isegi kui lint ebaõnnestub

      - name: Build application
        run: npm run build

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }} # nt. timir.elkdata.ee
          username: ${{ secrets.FTP_USERNAME }} # nt. vhost144451f1
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /htdocs/ # elkdata.ee kasutab /htdocs/
          protocol: ftps # FTP-SSL (Explicit AUTH TLS) - nõutud elkdata.ee poolt
          port: 21 # FTPS port
          dangerous-clean-slate: false # Ära kustuta olemasolevaid faile
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
