name: Deploy to Homelab

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, homelab]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to nginx serve directory
        run: |
          if [ ! -f dist/index.html ]; then
            echo "ERROR: dist/index.html missing — build produced no output" >&2
            exit 1
          fi
          mkdir -p /srv/data/games/study
          rm -rf /srv/data/games/study/*
          cp -r dist/* /srv/data/games/study/
          echo "Deployed at $(date)"
