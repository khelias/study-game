name: Build and Deploy to FTP

on:
  push:
    branches:
      - main
  workflow_dispatch: # Võimaldab käsitsi käivitamist

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Build application
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to FTP using lftp
        run: |
          lftp -c "
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ftp:ssl-protect-list true
          set ssl:verify-certificate false
          set ftp:passive-mode true
          set net:timeout 60
          set net:max-retries 3
          set ftp:use-feat false
          set ftp:use-mdtm false
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} -p 21 ${{ secrets.FTP_SERVER }}
          mirror --reverse --delete --verbose --exclude-glob .git* --exclude-glob node_modules* ./dist/ .
          quit
          "
